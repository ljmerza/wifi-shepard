<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>{% block title %}wifi-shepard{% endblock %}</title>
<style>
  body { font-family: ui-monospace, "SF Mono", Menlo, monospace; margin: 1.5rem; max-width: 1100px; }
  h1 { font-size: 1.2rem; margin-bottom: 0.5rem; }
  table { border-collapse: collapse; width: 100%; }
  th, td { padding: 0.4rem 0.6rem; border-bottom: 1px solid #333; text-align: left; }
  th a { color: inherit; text-decoration: none; }
  th a:hover { text-decoration: underline; }
  tr.dry { color: #888; font-style: italic; }
  .tile { display: inline-block; padding: 0.6rem 1rem; margin-right: 1rem; border: 1px solid #444; border-radius: 4px; }
  .tile .label { font-size: 0.8rem; color: #888; }
  .tile .value { font-size: 1.4rem; }
  nav a { margin-right: 1rem; }
  .empty { color: #888; padding: 1rem 0; }
</style>
</head>
<body>
<nav>
  <a href="/">Overview</a>
  <a href="/devices">Devices</a>
</nav>
{% block body %}{% endblock %}
</body>
</html>

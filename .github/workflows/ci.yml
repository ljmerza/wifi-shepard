name: ci

on:
  pull_request:

concurrency:
  group: ci-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  tests:
    permissions:
      contents: read
    uses: ljmerza/misc-actions/.github/workflows/python-tests.yml@v2
    with:
      python-version: "3.12"
      coverage-source: wifi_shepard,wifi_shepard_ui
    secrets: inherit

  build-daemon:
    needs: tests
    permissions:
      contents: read
      packages: write
    uses: ljmerza/misc-actions/.github/workflows/docker-ci.yml@v2
    with:
      image-name: ghcr.io/${{ github.repository_owner }}/wifi-shepard
    secrets: inherit

  build-ui:
    needs: tests
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - uses: ljmerza/misc-actions/actions/docker-build-push@v1
        with:
          image-name: ghcr.io/${{ github.repository_owner }}/wifi-shepard-ui
          dockerfile: Dockerfile.ui
          registry-password: ${{ secrets.GITHUB_TOKEN }}
          tags: |
            type=raw,value=pr-${{ github.event.pull_request.number }}
            type=sha,prefix=sha-

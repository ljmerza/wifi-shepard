# SCOPE NOTE — the daemon implements the AC-driven core plus ADR-0003 (kick
# mechanism), ADR-0004 (rate limits), ADR-0005/0006 (reboot identification +
# scheduling), ADR-0007 (per-MAC backoff cooldowns + hourly/daily caps +
# quiet hours), and ADR-0008 (detection.ap_cu_total_min AP-saturation gate).
#
# Still NOT consumed by the loader (no runtime effect):
#   home_assistant (the HA notifier is built/passed via the build_daemon kwarg
#     instead of constructed from YAML),
#   scanner.log_level / scanner.log_format.
#
# Still REJECTED at parse time (deferred follow-up to ADR-0008):
#   quiet_hours.override_threshold.ap_cu_total_min — the AP-saturation gate now
#     exists, but tightening it during quiet hours is a separate follow-up, so
#     the loader still rejects this key. It is omitted below.

controllers:
  - type: unifi
    name: home
    host: ${UNIFI_HOST}
    username: ${UNIFI_USERNAME}
    password: ${UNIFI_PASSWORD}
    site: ${UNIFI_SITE}
    # The code default is verify_ssl: true (full cert + hostname verification).
    # The typical UDM Pro ships a self-signed cert that won't validate against the
    # system CA bundle, so a stock UniFi setup needs this explicit opt-out. Once you
    # install a real cert (or run UniFi behind a TLS-terminating reverse proxy),
    # remove this line so the secure default takes effect.
    verify_ssl: false

home_assistant:
  url: http://homeassistant:8123
  token: ${HA_TOKEN}
  notify_service: mobile_app_pixel

scanner:
  poll_interval_seconds: 60
  window_samples: 5
  log_level: info
  log_format: human
  dry_run: true

detection:
  tx_rate_kbps_max: 12000
  retry_pct_max: 30
  signal_dbm_max: -70
  radios: [ng]
  ap_cu_total_min: 60

backoff:
  cooldowns_seconds: [300, 1800, 7200, 43200, 86400]
  max_kicks_per_hour: 3
  max_kicks_per_day: 10
  quarantine_after_kicks: 5

# ADR-0004: cross-MAC safety rails. Both knobs are opt-in (0 = off).
# Recommended workflow: enable with scanner.dry_run: true for >= 1 week,
# read kick_deferred log frequency, then size to taste before flipping
# dry_run to false.
safety_rails:
  # Global single-flight: minimum seconds between any two wire-level kicks
  # across the whole network. Prevents UniFi anti-brute-force lockout when
  # many clients flag bad-state in one cycle. Affects deauth, BTM, AND the
  # deauth_fallback under an ADR-0003 attempt_group.
  min_seconds_between_kicks: 5

  # Per-AP cap: maximum logical kicks against any single AP within the rolling
  # window. Counted at attempt_group granularity, so an ADR-0003
  # BTM+deauth_fallback pair counts as one. Prevents draining an AP when
  # several clients on it go bad-state simultaneously.
  max_kicks_per_ap_per_window: 3
  per_ap_window_seconds: 600

# ADR-0005: device identification & reboot-backend selection. Opt-in, default-off.
# This block decides *which* device a MAC maps to and *how* it would be rebooted
# (delegated to Home Assistant); the reboot *action* + scheduling arrive with
# ADR-0006, so enabling this alone has no runtime effect yet.
#
# Setup is intentionally minimal: list the MACs you allow rebooting under
# `eligible:` and Home Assistant resolves how (its restart button, else a
# smart-plug outlet switch). No per-device backend/address needed when the
# device is in HA. `overrides:` is only for devices HA can't auto-resolve.
# Allowlisted MACs are never reboot-eligible, regardless of OUI.
reboot:
  enabled: false
  resolver: home_assistant
  eligible:
    - 08:f9:e0:ba:c4:84
    - 08:f9:e0:ba:c6:48
  overrides:
    - mac: 08:f9:e0:ba:c6:48
      name: "kitchen stove wled"
      ha_entity: switch.kitchen_stove_plug

quiet_hours:
  start: "23:00"
  end: "07:00"
  timezone: America/Chicago
  # Stricter thresholds; during quiet hours a kick requires these (per-field
  # more-conservative-wins). ap_cu_total_min is intentionally omitted — the §3
  # AP-saturation gate (ADR-0008) now exists, but quiet-hours tightening of it
  # is a deferred follow-up, so the loader still rejects this key.
  override_threshold:
    tx_rate_kbps_max: 2000
    retry_pct_max: 50

allowlist:
  - aa:bb:cc:dd:ee:ff
  - 11:22:33:44:55:66

overrides:
  - mac: dc:cc:e6:66:86:2b
    name: "leonardo s22"
    tx_rate_kbps_max: 6000
    radios: [ng, na, 6e]
  - mac: 64:57:25:81:89:ab
    name: "back bedroom camera"
    max_kicks_per_day: 3
    signal_dbm_max: -65
    ap_cu_total_min: 80  # only move it when its AP is heavily saturated (ADR-0008)
